<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="StudyTrack" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<title>I.Z.U</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="app">
  <!-- Navigation -->
  <nav class="sidebar">
    <div class="logo">
      <div class="logo-mark"></div>
      <span class="logo-text">I.Z.U</span>
    </div>
    <div class="nav-items">
      <button class="nav-btn active" data-view="dashboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        <span>Today</span>
      </button>
      <button class="nav-btn" data-view="calendar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Calendar</span>
      </button>
      <button class="nav-btn" data-view="assignments">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/></svg>
        <span>Assignments</span>
      </button>
      <button class="nav-btn" data-view="courses">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <span>Courses</span>
      </button>
      <button class="nav-btn" data-view="study">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>Study Sessions</span>
      </button>
    </div>
    <div class="sidebar-footer">
      <button class="notif-btn" id="notifBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span>Enable notifications</span>
      </button>
    </div>
  </nav>

  <!-- Main content -->
  <main class="main">
    <!-- Dashboard / Today view -->
    <section class="view active" id="dashboard-view">
      <header class="view-header">
        <div>
          <p class="date-label" id="todayDate"></p>
          <h1 class="view-title">Today</h1>
        </div>
        <button class="btn-primary" onclick="openModal('assignment')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New
        </button>
      </header>

      <div class="stats-grid">
        <div class="stat-card">
          <p class="stat-label">Due this week</p>
          <p class="stat-value" id="dueWeek">0</p>
          <div class="stat-bar"><div class="stat-bar-fill" id="dueWeekBar"></div></div>
        </div>
        <div class="stat-card">
          <p class="stat-label">In progress</p>
          <p class="stat-value" id="inProgress">0</p>
          <div class="stat-bar"><div class="stat-bar-fill" id="inProgressBar"></div></div>
        </div>
        <div class="stat-card">
          <p class="stat-label">Completed</p>
          <p class="stat-value" id="completedCount">0</p>
          <div class="stat-bar"><div class="stat-bar-fill" id="completedBar"></div></div>
        </div>
      </div>

      <div class="dash-grid">
        <div class="dash-col">
          <div class="section-header">
            <h2>Up next</h2>
            <span class="section-count" id="upcomingCount">0</span>
          </div>
          <div class="card-list" id="upcomingList"></div>
        </div>

        <div class="dash-col">
          <div class="section-header">
            <h2>Today's events</h2>
            <button class="btn-ghost-sm" onclick="openModal('event')">+ Event</button>
          </div>
          <div class="card-list" id="todayEvents"></div>

          <div class="section-header" style="margin-top: 32px;">
            <h2>Study blocks</h2>
            <button class="btn-ghost-sm" onclick="openModal('study')">+ Block</button>
          </div>
          <div class="card-list" id="todayStudy"></div>
        </div>
      </div>
    </section>

    <!-- Calendar view -->
    <section class="view" id="calendar-view">
      <header class="view-header">
        <div>
          <p class="date-label" id="calMonthLabel"></p>
          <h1 class="view-title" id="calYearLabel"></h1>
        </div>
        <div class="cal-controls">
          <button class="btn-icon" onclick="changeMonth(-1)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <button class="btn-ghost" onclick="goToToday()">Today</button>
          <button class="btn-icon" onclick="changeMonth(1)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
      </header>
      <div class="calendar" id="calendar"></div>
    </section>

    <!-- Assignments view -->
    <section class="view" id="assignments-view">
      <header class="view-header">
        <div>
          <p class="date-label">All items</p>
          <h1 class="view-title">Assignments</h1>
        </div>
        <button class="btn-primary" onclick="openModal('assignment')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New assignment
        </button>
      </header>
      <div class="filters">
        <button class="filter-chip active" data-filter="all">All</button>
        <button class="filter-chip" data-filter="active">Active</button>
        <button class="filter-chip" data-filter="completed">Completed</button>
        <button class="filter-chip" data-filter="high">High priority</button>
      </div>
      <div class="card-list" id="assignmentsList"></div>
    </section>

    <!-- Courses view -->
    <section class="view" id="courses-view">
      <header class="view-header">
        <div>
          <p class="date-label">Color-coded</p>
          <h1 class="view-title">Courses</h1>
        </div>
        <button class="btn-primary" onclick="openModal('course')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New course
        </button>
      </header>
      <div class="course-grid" id="coursesList"></div>
    </section>

    <!-- Study view -->
    <section class="view" id="study-view">
      <header class="view-header">
        <div>
          <p class="date-label">Planned focus time</p>
          <h1 class="view-title">Study Sessions</h1>
        </div>
        <button class="btn-primary" onclick="openModal('study')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New session
        </button>
      </header>
      <div class="card-list" id="studyList"></div>
    </section>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">New</h2>
      <button class="btn-icon" onclick="closeModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
